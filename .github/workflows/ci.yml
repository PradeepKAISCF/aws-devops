name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Triggers the pipeline when you push to the main branch

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub Actions to push changes back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Tags the image with the unique Git commit ID (SHA)
          tags: ${{ secrets.DOCKER_USERNAME }}/gitops-flask-app:${{ github.sha }}

      - name: Update Kubernetes deployment YAML
        run: |
          # Finds the old image line and replaces it with the newly built image
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-flask-app:${{ github.sha }}|g" k8s/deployment.yaml
          
          # Push the updated YAML back to GitHub
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }} via CI"
          git push
