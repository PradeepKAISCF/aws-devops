apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: pradeepkaiscf/gitops-flask-app:75f72c9038080a7b7f176ca4717ca069656ac835
        # Notice the command line is GONE
        ports:
        - containerPort: 5000
