apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: pradeepkaiscf/gitops-flask-app:e7c493e17ce942530443e0662fbdb22dd3b65271
        # Notice the command line is GONE
        ports:
        - containerPort: 5000
