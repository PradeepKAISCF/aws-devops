apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: pradeepkaiscf/gitops-flask-app:326dd21fb1b3bd66ad71e462368d939d145c3082
        # Notice the command line is GONE
        ports:
        - containerPort: 5000
