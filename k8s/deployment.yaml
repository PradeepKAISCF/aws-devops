apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: your-username/gitops-flask-app:some-sha-string  # <--- Leave whatever is already here!
        # Notice the command line is GONE
        ports:
        - containerPort: 5000
