apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: pradeepkaiscf/gitops-flask-app:5b3d66905dda5326c20512adcb5ccc7d39acc09d
        # Notice the command line is GONE
        ports:
        - containerPort: 5000
